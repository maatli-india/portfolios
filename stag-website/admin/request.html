<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STAG Admin — Club Request Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body class="dash-body">

  <div class="detail-page">
    <div class="detail-topbar">
      <a class="back-link" id="backLink" href="dashboard.html#requests">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Club Requests
      </a>
    </div>

    <div id="reqContent">
      <div class="detail-loading">Loading request details…</div>
    </div>
  </div>

  <!-- Photo lightbox -->
  <div class="photo-lightbox" id="photoLightbox" role="dialog" aria-modal="true" aria-label="Profile photo">
    <button class="photo-lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    <img class="photo-lightbox-img" id="lightboxImg" src="" alt="Profile photo" />
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/request.js"></script>
</body>
</html>
